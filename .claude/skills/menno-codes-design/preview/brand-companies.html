<!DOCTYPE html>
<html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="card-base.css">
<style>
  .card { display: flex; gap: 18px; padding: 28px; align-items: center; flex-wrap: wrap; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .square {
    width: 56px; height: 56px;
    background: #fff;
    border: 1px solid var(--color-border-2);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .square img { width: 80%; height: 80%; object-fit: contain; }
  .lbl { font-family: var(--font-mono); font-size: 0.55rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--color-text-faint); }
</style></head><body><div class="card">
  <div class="item"><div class="square"><img src="../assets/logos/kape-icon.jpeg" alt=""></div><span class="lbl">Kape</span></div>
  <div class="item"><div class="square"><img src="../assets/logos/pia-icon.png" alt=""></div><span class="lbl">PIA</span></div>
  <div class="item"><div class="square"><img src="../assets/logos/express-vpn-icon.png" alt=""></div><span class="lbl">ExpressVPN</span></div>
  <div class="item"><div class="square"><img src="../assets/logos/cyberghost-icon.jpg" alt=""></div><span class="lbl">CyberGhost</span></div>
  <div class="item"><div class="square"><img src="../assets/logos/zenmate-icon.png" alt=""></div><span class="lbl">ZenMate</span></div>
</div></body></html>
