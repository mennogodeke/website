<!DOCTYPE html>
<html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="card-base.css">
<style>
  .card { display: flex; flex-direction: column; gap: 14px; padding: 28px; align-items: flex-start; }
  .wordmark {
    font-family: var(--font-display); font-weight: 800;
    font-size: 3.2rem; color: var(--color-text);
    text-transform: uppercase; letter-spacing: 0.01em; line-height: 1;
  }
  .scales { display: flex; align-items: baseline; gap: 28px; color: var(--color-text); }
  .scales span { font-family: var(--font-display); font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; }
  .scales .nav { font-size: 1.35rem; }
  .scales .ft  { font-size: 0.85rem; letter-spacing: 0.08em; }
  .lbl { font-family: var(--font-mono); font-size: 0.58rem; color: var(--color-text-faint); letter-spacing: 0.07em; text-transform: uppercase; }
</style></head><body><div class="card">
  <div class="wordmark">MENNO.CODES</div>
  <div class="scales">
    <span class="nav">MENNO.CODES <em class="lbl" style="font-style:normal;margin-left:6px">nav · 1.35rem</em></span>
    <span class="ft">MENNO.CODES <em class="lbl" style="font-style:normal;margin-left:6px">footer · 0.85rem</em></span>
  </div>
</div></body></html>
