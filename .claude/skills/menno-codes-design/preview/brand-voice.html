<!DOCTYPE html>
<html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="card-base.css">
<style>
  .card { padding: 22px 28px; display: flex; flex-direction: column; gap: 14px; }
  .row { display: grid; grid-template-columns: 92px 1fr; gap: 16px; align-items: baseline; }
  .lbl { font-family: var(--font-mono); font-size: 0.55rem; color: var(--color-text-faint); letter-spacing: 0.07em; text-transform: uppercase; }
  .line { font-family: var(--font-body); font-size: 0.95rem; color: var(--color-text); line-height: 1.5; }
  .line em { font-style: normal; color: var(--color-text-muted); }
  .quip { font-family: var(--font-body); font-size: 0.85rem; color: var(--color-text-muted); line-height: 1.55; font-style: italic; }
</style></head><body><div class="card">
  <div class="row"><span class="lbl">Greet</span><div class="line">Hi, I'm Menno 👋</div></div>
  <div class="row"><span class="lbl">Hook</span><div class="line">Web, App and Platform Developer.</div></div>
  <div class="row"><span class="lbl">Bio</span><div class="line"><em>10 years building back-end systems, full-stack web apps, and developer tooling. Ruby on Rails at the core. Everything else as needed.</em></div></div>
  <div class="row"><span class="lbl">Quip</span><div class="quip">"…and enough IAM policies to fill a small novel."</div></div>
  <div class="row"><span class="lbl">Closer</span><div class="line">Open to work. <span style="color:var(--color-primary)">Let's talk.</span></div></div>
</div></body></html>
