<!DOCTYPE html>
<html data-theme="dark"><head><meta charset="utf-8">
<link rel="stylesheet" href="card-base.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@v2.16.0/devicon.min.css">
<style>
  .card { display: flex; flex-wrap: wrap; gap: 8px; padding: 24px 28px; }
  .tag {
    display: inline-flex; align-items: center; gap: 0.4em;
    padding: 0.3em 0.75em; border-radius: 999px;
    font-size: 0.72rem; font-family: var(--font-mono);
    letter-spacing: 0.04em; text-transform: uppercase;
    border: 1px solid color-mix(in srgb, var(--c) 35%, transparent);
    color: color-mix(in srgb, var(--c) 80%, transparent);
    background: color-mix(in srgb, var(--c) 8%, transparent);
  }
  .tag i { font-size: 0.9rem; }
</style></head><body><div class="card">
  <span class="tag" style="--c:#CC342D"><i class="devicon-ruby-plain"></i>Ruby</span>
  <span class="tag" style="--c:#CC0000"><i class="devicon-rails-plain"></i>Rails</span>
  <span class="tag" style="--c:#00ADD8"><i class="devicon-go-plain"></i>Go</span>
  <span class="tag" style="--c:#2496ED"><i class="devicon-docker-plain"></i>Docker</span>
  <span class="tag" style="--c:#326CE5"><i class="devicon-kubernetes-plain"></i>Kubernetes</span>
  <span class="tag" style="--c:#336791"><i class="devicon-postgresql-plain"></i>PostgreSQL</span>
  <span class="tag" style="--c:#FF9900"><i class="devicon-amazonwebservices-plain-wordmark"></i>AWS</span>
  <span class="tag" style="--c:#844FBA"><i class="devicon-terraform-plain"></i>Terraform</span>
  <span class="tag" style="--c:#F05138"><i class="devicon-swift-plain"></i>Swift</span>
  <span class="tag" style="--c:#F7DF1E"><i class="devicon-javascript-plain"></i>JavaScript</span>
</div></body></html>
