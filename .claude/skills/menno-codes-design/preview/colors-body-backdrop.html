<!DOCTYPE html>
<html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="card-base.css">
<style>
  body { padding: 0; }
  .full {
    height: 320px;
    background:
      radial-gradient(ellipse at 90% 0%, var(--body-shine) 0%, transparent 45%),
      radial-gradient(ellipse at 15% 100%, var(--body-shine) 0%, transparent 35%),
      radial-gradient(ellipse at 65% 10%, var(--body-glow) 0%, transparent 55%),
      linear-gradient(180deg, var(--body-grad-from) 0%, var(--body-grad-mid) 100%);
    position: relative;
    padding: 28px;
    box-sizing: border-box;
    overflow: hidden;
  }
  .full .label {
    font-family: var(--font-mono); font-size: 0.62rem; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.1em;
  }
  .full .stack { position: absolute; bottom: 20px; left: 28px; right: 28px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; font-family: var(--font-mono); font-size: 0.55rem; color: rgba(255,255,255,0.5); letter-spacing: 0.06em; text-transform: uppercase;}
  .stack span { padding: 6px 8px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.12); }
</style></head><body>
<div class="full">
  <div class="label">Ambient body backdrop · 4-layer stack</div>
  <div class="stack">
    <span>shine ↗ 90% 0%</span>
    <span>shine ↙ 15% 100%</span>
    <span>glow ↑ 65% 10%</span>
    <span>linear #00020F→#010C2A</span>
  </div>
</div>
</body></html>
