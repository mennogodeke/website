<!DOCTYPE html>
<html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="card-base.css">
<style>
  .card { display: flex; align-items: center; gap: 28px; }
  .specimen { font-family: var(--font-body); font-size: 64px; line-height: 0.95; color: var(--color-text); font-weight: 500; letter-spacing: -0.02em; }
  .specimen small { display:block; font-size: 16px; font-weight: 400; color: var(--color-text-muted); margin-top:8px; letter-spacing: 0; }
  .meta { display: flex; flex-direction: column; gap: 4px; }
  .meta .name { font-family: var(--font-display); font-size: 1.5rem; color: var(--color-text); text-transform: uppercase; }
  .meta .desc { font-family: var(--font-body); font-size: 0.85rem; color: var(--color-text-muted); max-width: 260px; line-height: 1.55; }
  .meta .tech { font-family: var(--font-mono); font-size: 0.62rem; color: var(--color-text-faint); text-transform: uppercase; letter-spacing: 0.08em; }
</style></head><body><div class="card">
<div class="specimen">Aa<small>The quick brown fox jumps over the lazy dog</small></div>
<div class="meta">
  <div class="tech">Body · 400 / 500 / 600 / 700</div>
  <div class="name">DM Sans</div>
  <div class="desc">Paragraphs, form input, nav links, descriptions. Friendly, geometric.</div>
</div></div></body></html>
