<!DOCTYPE html>
<html data-theme="dark"><head><meta charset="utf-8">
<link rel="stylesheet" href="card-base.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@v2.16.0/devicon.min.css">
<style>
  body { padding: 0; }
  .card { padding: 0 28px; }
  .tl-track { position: relative; }
  .tl-track::before { content: ''; position: absolute; left: 19px; top: 0; bottom: 0; width: 2px; background: var(--color-border-2); }
  .entry { position: relative; padding: 22px 0 22px 56px; border-top: 1px solid var(--color-border); }
  .entry.open { background: var(--color-bg-card); }
  .entry.open::after { content:''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--color-primary); }
  .dot { position: absolute; left: 14px; top: 26px; width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--color-primary); background: var(--color-primary); }
  .dot.closed { background: var(--color-bg); border-color: var(--color-border-2); }
  .date { position: absolute; left: 1px; top: 56px; width: 36px; display: flex; flex-direction: column; align-items: center; font-family: var(--font-mono); font-size: 0.5rem; color: var(--color-text-faint); line-height: 1.8; letter-spacing: 0.03em; }
  .header { display: flex; align-items: center; gap: 16px; }
  .header-main { flex: 1; min-width: 0; }
  .meta { font-family: var(--font-mono); font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.09em; color: var(--color-text-faint); margin-bottom: 4px; }
  .role { font-family: var(--font-display); font-size: 1.5rem; line-height: 0.9; text-transform: uppercase; }
  .role .hl {
    display: inline; color: #fff; padding: 0 0.15em;
    background: linear-gradient(160deg, var(--highlight-legendary-from) 0%, var(--highlight-legendary-mid) 50%, var(--highlight-legendary-to) 100%);
  }
  .company { margin-top: 6px; font-size: 0.85rem; color: var(--color-common); font-family: var(--font-display); text-transform: uppercase; letter-spacing: 0.02em; }
  .logo { width: 36px; height: 36px; background: var(--color-bg-card); border: 1px solid var(--color-border); display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 0.55rem; color: var(--color-text-faint); }
  .chev { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; color: var(--color-text-faint); font-size: 0.7rem; transform: rotate(180deg); }
</style></head><body><div class="card"><div class="tl-track">
  <div class="entry open">
    <span class="dot"></span>
    <span class="date"><span>2022</span><span>Now</span></span>
    <div class="header">
      <div class="header-main">
        <div class="role"><span class="hl">Senior Engineer</span></div>
        <div class="company">Kape Technologies</div>
      </div>
      <div class="logo">KT</div>
      <div class="chev">▾</div>
    </div>
  </div>
</div></div></body></html>
