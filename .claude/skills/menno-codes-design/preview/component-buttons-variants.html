<!DOCTYPE html>
<html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="card-base.css">
<style>
  .card { display: flex; flex-wrap: wrap; gap: 14px; align-items: center; padding: 28px; }
  .btn {
    display: inline-flex; align-items: center; gap: 0.5rem;
    font-family: var(--font-display); font-weight: 800; font-size: 1rem;
    text-transform: uppercase; letter-spacing: 0.05em;
    padding: 0.6em 1.4em; border: 2px solid var(--color-border-2); border-radius: 0;
    background: transparent; color: var(--color-text-muted); cursor: pointer; line-height: 1;
  }
  .btn-primary { background: var(--color-primary); color: var(--color-primary-invert); border-color: var(--color-primary); }
  .btn-secondary { background: transparent; color: var(--color-primary); border-color: var(--color-primary); }
</style></head><body><div class="card">
  <a class="btn">Default</a>
  <a class="btn btn-primary">Get My CV →</a>
  <a class="btn btn-secondary">Get in Touch</a>
</div></body></html>
