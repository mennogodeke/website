<!DOCTYPE html>
<html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="card-base.css">
<style>
  .card { display: flex; align-items: baseline; gap: 28px; }
  .specimen { font-family: var(--font-heading); font-size: 76px; line-height: 0.9; color: var(--color-text); letter-spacing: 0.01em; }
  .meta { display: flex; flex-direction: column; gap: 4px; }
  .meta .name { font-family: var(--font-heading); font-size: 1.5rem; color: var(--color-text); }
  .meta .desc { font-family: var(--font-body); font-size: 0.85rem; color: var(--color-text-muted); max-width: 260px; line-height: 1.55; }
  .meta .tech { font-family: var(--font-mono); font-size: 0.62rem; color: var(--color-text-faint); text-transform: uppercase; letter-spacing: 0.08em; }
</style></head><body><div class="card">
<div class="specimen">Aa<br>Bb</div>
<div class="meta">
  <div class="tech">Heading · 400 · Small Caps</div>
  <div class="name">Anton SC</div>
  <div class="desc">Small-caps cousin of Anton. Used for h2 → h6 subordinate headings.</div>
</div></div></body></html>
