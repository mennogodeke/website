<!DOCTYPE html>
<html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="card-base.css">
<style>
  .card { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .swatch { display: flex; flex-direction: column; gap: 6px; padding: 18px; min-height: 92px; }
  .swatch .name { font-family: var(--font-display); font-size: 1rem; text-transform: uppercase; }
  .swatch .hex  { font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.04em; opacity: 0.7; }
  .yellow { background: var(--color-primary); color: var(--color-primary-invert); }
  .navy { background: var(--color-primary-invert); color: var(--color-primary); border: 1px solid var(--color-border-2); }
</style></head><body><div class="card">
  <div class="swatch yellow">
    <div class="name">Primary</div>
    <div class="hex">#F5E90C</div>
    <div class="hex" style="margin-top:auto">Electric yellow · CTA fill, h1 paint, focus ring</div>
  </div>
  <div class="swatch navy">
    <div class="name">Primary Invert</div>
    <div class="hex">#0B1729</div>
    <div class="hex" style="margin-top:auto">Deep navy · CTA text on yellow, page base</div>
  </div>
</div></body></html>
