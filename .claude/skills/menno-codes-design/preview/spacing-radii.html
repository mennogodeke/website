<!DOCTYPE html>
<html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="card-base.css">
<style>
  .card { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; align-items: center; padding: 22px 28px; }
  .demo { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .shape { background: var(--color-primary); width: 80px; height: 60px; }
  .name { font-family: var(--font-display); font-size: 0.8rem; color: var(--color-text); text-transform: uppercase; }
  .val { font-family: var(--font-mono); font-size: 0.6rem; color: var(--color-text-faint); letter-spacing: 0.05em; }
  .none { border-radius: 0; }
  .pill { border-radius: 999px; width: 110px; height: 36px; }
  .circle { border-radius: 50%; width: 60px; height: 60px; }
</style></head><body><div class="card">
  <div class="demo">
    <div class="shape none"></div>
    <div class="name">None</div>
    <div class="val">radius: 0 · default</div>
  </div>
  <div class="demo">
    <div class="shape pill"></div>
    <div class="name">Pill</div>
    <div class="val">999px · badges, chips</div>
  </div>
  <div class="demo">
    <div class="shape circle"></div>
    <div class="name">Circle</div>
    <div class="val">50% · dots, avatars</div>
  </div>
</div></body></html>
