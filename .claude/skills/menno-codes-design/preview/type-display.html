<!DOCTYPE html>
<html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="card-base.css">
<style>
  .card { display: flex; align-items: baseline; gap: 28px; }
  .specimen { font-family: var(--font-display); font-size: 88px; line-height: 0.85; color: var(--color-text); text-transform: uppercase; letter-spacing: -0.01em; }
  .meta { display: flex; flex-direction: column; gap: 4px; }
  .meta .name { font-family: var(--font-display); font-size: 1.5rem; color: var(--color-text); text-transform: uppercase; }
  .meta .desc { font-family: var(--font-body); font-size: 0.85rem; color: var(--color-text-muted); max-width: 240px; line-height: 1.55; }
  .meta .tech { font-family: var(--font-mono); font-size: 0.62rem; color: var(--color-text-faint); text-transform: uppercase; letter-spacing: 0.08em; }
</style></head><body><div class="card">
<div class="specimen">Aa<br>123</div>
<div class="meta">
  <div class="tech">Display · 700</div>
  <div class="name">Anton</div>
  <div class="desc">Tall, narrow, all-caps sans. The loud voice — h1, big numerals, button labels.</div>
</div></div></body></html>
