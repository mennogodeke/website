<!DOCTYPE html>
<html data-theme="dark"><head><meta charset="utf-8">
<link rel="stylesheet" href="card-base.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@v2.16.0/devicon.min.css">
<style>
  .card { display: flex; gap: 18px; align-items: center; flex-wrap: wrap; padding: 28px; }
  .wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .chip {
    width: 44px; height: 44px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    border: 1px solid color-mix(in srgb, var(--c) 35%, transparent);
    color: color-mix(in srgb, var(--c) 80%, transparent);
    background: color-mix(in srgb, var(--c) 8%, transparent);
  }
  .lbl { font-family: var(--font-mono); font-size: 0.55rem; color: var(--color-text-faint); text-transform: uppercase; letter-spacing: 0.06em; }
</style></head><body><div class="card">
  <div class="wrap"><div class="chip" style="--c:#CC342D"><i class="devicon-ruby-plain"></i></div><span class="lbl">Ruby</span></div>
  <div class="wrap"><div class="chip" style="--c:#CC0000"><i class="devicon-rails-plain"></i></div><span class="lbl">Rails</span></div>
  <div class="wrap"><div class="chip" style="--c:#2496ED"><i class="devicon-docker-plain"></i></div><span class="lbl">Docker</span></div>
  <div class="wrap"><div class="chip" style="--c:#00ADD8"><i class="devicon-go-plain"></i></div><span class="lbl">Go</span></div>
  <div class="wrap"><div class="chip" style="--c:#326CE5"><i class="devicon-kubernetes-plain"></i></div><span class="lbl">K8s</span></div>
  <div class="wrap"><div class="chip" style="--c:#F05138"><i class="devicon-swift-plain"></i></div><span class="lbl">Swift</span></div>
  <div class="wrap"><div class="chip" style="--c:#336791"><i class="devicon-postgresql-plain"></i></div><span class="lbl">Postgres</span></div>
  <div class="wrap"><div class="chip" style="--c:#FF9900"><i class="devicon-amazonwebservices-plain-wordmark"></i></div><span class="lbl">AWS</span></div>
</div></body></html>
