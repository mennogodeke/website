<!DOCTYPE html>
<html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="card-base.css">
<style>
  .card { display: flex; align-items: center; gap: 18px; padding: 32px 28px; flex-wrap: wrap; }
  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(74,222,128,0.12); border: 1px solid rgba(74,222,128,0.35);
    border-radius: 20px; padding: 5px 14px;
    font-family: var(--font-display); font-size: 0.75rem; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase; color: #4ade80;
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; animation: blink 2s infinite; }
  @keyframes blink { 0%,100% { opacity: 1 } 50% { opacity: 0.3 } }

  .meta { font-family: var(--font-mono); font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--color-text-faint); }
  .stamp {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--font-mono); font-size: 0.55rem; color: var(--color-text-faint);
    letter-spacing: 0.06em; text-transform: uppercase;
    border: 1px solid var(--color-border-2); padding: 6px 10px;
  }
</style></head><body><div class="card">
  <span class="badge"><span class="dot"></span>Open to work</span>
  <span class="meta">Status · Available now</span>
  <span class="stamp">2017 — 2026</span>
</div></body></html>
