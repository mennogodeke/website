<!DOCTYPE html>
<html data-theme="dark"><head><meta charset="utf-8">
<link rel="stylesheet" href="card-base.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@v2.16.0/devicon.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  body { padding: 0; }
  .card { padding: 14px 28px; }
  .row { display: grid; grid-template-columns: 96px 1fr; gap: 16px; align-items: center; padding: 12px 0; border-top: 1px solid var(--color-border); }
  .row:first-child { border-top: none; }
  .name { font-family: var(--font-display); font-size: 0.85rem; text-transform: uppercase; color: var(--color-text); letter-spacing: 0.05em; }
  .name small { display: block; font-family: var(--font-mono); font-size: 0.55rem; color: var(--color-text-faint); letter-spacing: 0.05em; margin-top: 4px; font-weight: 400; }
  .glyphs { display: flex; flex-wrap: wrap; gap: 14px; align-items: center; font-size: 1.4rem; color: var(--color-text-muted); }
  .glyphs i { transition: color 0.15s; }
</style></head><body><div class="card">
  <div class="row">
    <div class="name">Devicon<small>v2.16.0</small></div>
    <div class="glyphs">
      <i class="devicon-ruby-plain colored"></i>
      <i class="devicon-rails-plain colored"></i>
      <i class="devicon-go-plain colored"></i>
      <i class="devicon-docker-plain colored"></i>
      <i class="devicon-kubernetes-plain colored"></i>
      <i class="devicon-postgresql-plain colored"></i>
      <i class="devicon-amazonwebservices-plain-wordmark colored"></i>
      <i class="devicon-terraform-plain colored"></i>
      <i class="devicon-swift-plain colored"></i>
      <i class="devicon-javascript-plain colored"></i>
    </div>
  </div>
  <div class="row">
    <div class="name">Font Awesome<small>6.5.0 free</small></div>
    <div class="glyphs">
      <i class="fa-solid fa-arrow-right"></i>
      <i class="fa-solid fa-chevron-down"></i>
      <i class="fa-solid fa-server"></i>
      <i class="fa-solid fa-layer-group"></i>
      <i class="fa-solid fa-gears"></i>
      <i class="fa-solid fa-cloud"></i>
      <i class="fa-brands fa-apple"></i>
      <i class="fa-solid fa-cubes"></i>
      <i class="fa-brands fa-github"></i>
      <i class="fa-brands fa-linkedin-in"></i>
      <i class="fa-solid fa-envelope"></i>
      <i class="fa-solid fa-language"></i>
      <i class="fa-solid fa-credit-card"></i>
      <i class="fa-solid fa-sun"></i>
      <i class="fa-solid fa-moon"></i>
    </div>
  </div>
  <div class="row">
    <div class="name">Unicode<small>used as UI</small></div>
    <div class="glyphs" style="gap:18px;font-family:var(--font-body);font-size:1.2rem;color:var(--color-text)">
      <span>→</span><span>←</span><span>↗</span><span>›</span><span>·</span><span>—</span>
    </div>
  </div>
</div></body></html>
