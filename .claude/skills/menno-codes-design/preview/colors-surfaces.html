<!DOCTYPE html>
<html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="card-base.css">
<style>
  .card { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .swatch { padding: 14px; min-height: 84px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid var(--color-border-2); }
  .name { font-family: var(--font-display); font-size: 0.85rem; text-transform: uppercase; color: var(--color-text); }
  .hex  { font-family: var(--font-mono); font-size: 0.58rem; color: var(--color-text-faint); letter-spacing: 0.04em; }
  .bg   { background: var(--color-bg); }
  .bg2  { background: var(--color-bg-2); }
  .card-bg { background: var(--color-bg-card); }
  .border-only { background: transparent; border-width: 2px; }
</style></head><body><div class="card">
  <div class="swatch bg"><div class="name">BG</div><div class="hex">#0B1729</div></div>
  <div class="swatch bg2"><div class="name">BG-2</div><div class="hex">#0D1E38</div></div>
  <div class="swatch card-bg"><div class="name">BG-Card</div><div class="hex">rgba(255 255 255 / 0.04)</div></div>
  <div class="swatch border-only"><div class="name">Border-2</div><div class="hex">rgba(255 255 255 / 0.16)</div></div>
</div></body></html>
