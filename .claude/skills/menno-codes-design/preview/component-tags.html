<!DOCTYPE html>
<html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="card-base.css">
<style>
  .card { display: flex; flex-wrap: wrap; gap: 8px; padding: 28px; }
  .tag {
    display: inline-flex; align-items: center; padding: 0.3em 0.75em;
    font-size: 0.7rem; font-family: var(--font-display); font-weight: 700;
    letter-spacing: 0.06em; text-transform: uppercase;
    background: var(--color-bg-card); border: 1px solid var(--color-border-2);
    color: var(--color-text-muted);
  }
</style></head><body><div class="card">
  <span class="tag">Ruby on Rails</span>
  <span class="tag">Go</span>
  <span class="tag">PostgreSQL</span>
  <span class="tag">Docker</span>
  <span class="tag">Terraform</span>
  <span class="tag">AWS</span>
  <span class="tag">Kubernetes</span>
  <span class="tag">TypeScript</span>
</div></body></html>
