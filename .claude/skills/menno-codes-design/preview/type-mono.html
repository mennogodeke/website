<!DOCTYPE html>
<html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="card-base.css">
<style>
  .card { display: flex; align-items: center; gap: 28px; }
  .specimen { font-family: var(--font-mono); font-size: 0.7rem; line-height: 1.8; color: var(--color-text-faint); text-transform: uppercase; letter-spacing: 0.08em; }
  .specimen .big { font-size: 18px; letter-spacing: 0.04em; color: var(--color-text); display:block; margin-bottom: 6px; }
  .meta { display: flex; flex-direction: column; gap: 4px; }
  .meta .name { font-family: var(--font-display); font-size: 1.4rem; color: var(--color-text); text-transform: uppercase; }
  .meta .desc { font-family: var(--font-body); font-size: 0.85rem; color: var(--color-text-muted); max-width: 240px; line-height: 1.55; }
  .meta .tech { font-family: var(--font-mono); font-size: 0.62rem; color: var(--color-text-faint); text-transform: uppercase; letter-spacing: 0.08em; }
</style></head><body><div class="card">
<div class="specimen">
  <span class="big">UI-MONOSPACE</span>
  Status · Available now<br>
  8YR Back-End · 5YR DevOps<br>
  Skills · Ordered by proficiency
</div>
<div class="meta">
  <div class="tech">Mono · 400</div>
  <div class="name">System Mono</div>
  <div class="desc">Meta labels, year stamps, tooltips. Always small, uppercase, wide-tracked.</div>
</div></div></body></html>
