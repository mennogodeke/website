<!DOCTYPE html>
<html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="card-base.css">
<style>
  .card { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; padding: 22px 28px; }
  .btn {
    display: inline-flex; align-items: center; gap: 0.5rem; position: relative;
    font-family: var(--font-display); font-weight: 800; font-size: 1rem;
    text-transform: uppercase; letter-spacing: 0.05em;
    padding: 0.6em 1.4em; border: 2px solid var(--color-primary); border-radius: 0;
    background: var(--color-primary); color: var(--color-primary-invert); line-height: 1;
  }
  .btn-sm { font-size: 0.8rem; padding: 0.45em 1em; }
  .btn-lg { font-size: 1.2rem; padding: 0.75em 1.75em; }
  .is-loading { color: transparent !important; }
  .is-loading::after { content:""; position:absolute; inset:0; margin:auto; width:1em; height:1em; border:2px solid var(--color-primary-invert); border-right-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; }
  .is-disabled { opacity: 0.35; pointer-events: none; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .row { display: flex; gap: 12px; align-items: center; width: 100%; }
  .row + .row { margin-top: 10px; }
  .lbl { font-family: var(--font-mono); font-size: 0.58rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--color-text-faint); width: 60px; }
</style></head><body><div class="card">
  <div class="row"><span class="lbl">Size</span><a class="btn btn-sm">Small</a><a class="btn">Normal</a><a class="btn btn-lg">Large</a></div>
  <div class="row"><span class="lbl">State</span><a class="btn">Idle</a><a class="btn is-loading">Loading</a><a class="btn is-disabled">Disabled</a></div>
</div></body></html>
