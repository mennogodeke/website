<!DOCTYPE html>
<html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="card-base.css">
<style>
  .card { display: flex; flex-direction: column; gap: 8px; padding-top: 18px; padding-bottom: 18px; }
  .row { display: grid; grid-template-columns: 64px 1fr 60px; align-items: center; gap: 14px; padding: 4px 0; }
  .key { font-family: var(--font-display); font-size: 0.85rem; text-transform: uppercase; color: var(--color-text); }
  .bar { height: 12px; background: var(--color-primary); }
  .val { font-family: var(--font-mono); font-size: 0.6rem; color: var(--color-text-faint); letter-spacing: 0.05em; text-align: right; }
</style></head><body><div class="card">
  <div class="row"><span class="key">mb-1</span><div class="bar" style="width:4px"></div><span class="val">0.25rem</span></div>
  <div class="row"><span class="key">mb-2</span><div class="bar" style="width:8px"></div><span class="val">0.5rem</span></div>
  <div class="row"><span class="key">mb-3</span><div class="bar" style="width:12px"></div><span class="val">0.75rem</span></div>
  <div class="row"><span class="key">mb-4</span><div class="bar" style="width:16px"></div><span class="val">1rem</span></div>
  <div class="row"><span class="key">mb-5</span><div class="bar" style="width:24px"></div><span class="val">1.5rem</span></div>
  <div class="row"><span class="key">mb-6</span><div class="bar" style="width:48px"></div><span class="val">3rem</span></div>
</div></body></html>
