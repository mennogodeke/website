<!DOCTYPE html>
<html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="card-base.css">
<style>
  .card { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .tier { display: flex; flex-direction: column; gap: 6px; padding: 14px; min-height: 100px; color: #fff; position: relative; }
  .tier .name { font-family: var(--font-display); font-size: 0.95rem; text-transform: uppercase; letter-spacing: 0.02em; }
  .tier .hex  { font-family: var(--font-mono); font-size: 0.58rem; opacity: 0.85; letter-spacing: 0.04em; margin-top: auto; }
  .tier .roman { font-family: var(--font-display); font-size: 1.4rem; opacity: 0.5; position: absolute; right: 12px; top: 10px; }
  .common { background: var(--color-common); color: #0b1729; }
  .uncommon { background: var(--color-uncommon); }
  .rare { background: var(--color-rare); }
  .epic { background: var(--color-epic); }
  .legendary { background: var(--color-legendary); }
</style></head><body><div class="card">
  <div class="tier common"><span class="roman">I</span><div class="name">Common</div><div class="hex">#BDBFBE</div></div>
  <div class="tier uncommon"><span class="roman">II</span><div class="name">Uncommon</div><div class="hex">#19A828</div></div>
  <div class="tier rare"><span class="roman">III</span><div class="name">Rare</div><div class="hex">#0464D1</div></div>
  <div class="tier epic"><span class="roman">IV</span><div class="name">Epic</div><div class="hex">#6A45E6</div></div>
  <div class="tier legendary"><span class="roman">V</span><div class="name">Legendary</div><div class="hex">#F0840A</div></div>
</div></body></html>
