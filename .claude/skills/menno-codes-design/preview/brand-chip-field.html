<!DOCTYPE html>
<html data-theme="dark"><head><meta charset="utf-8">
<link rel="stylesheet" href="card-base.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@v2.16.0/devicon.min.css">
<style>
  body { padding: 0; }
  .card {
    padding: 0; position: relative;
    height: 280px;
    background:
      radial-gradient(ellipse at 65% 10%, var(--body-glow) 0%, transparent 55%),
      linear-gradient(180deg, #00020f 0%, #010c2a 100%);
    overflow: hidden;
  }
  .chip {
    position: absolute; width: 40px; height: 40px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    border: 1px solid color-mix(in srgb, var(--c) 35%, transparent);
    color: color-mix(in srgb, var(--c) 80%, transparent);
    background: color-mix(in srgb, var(--c) 8%, transparent);
    animation: drift 9s ease-in-out infinite alternate;
  }
  .chip:nth-child(2n) { animation-duration: 11s; animation-delay: -3s; }
  .chip:nth-child(3n) { animation-duration: 13s; animation-delay: -6s; }
  .chip:nth-child(4n) { animation-duration: 8s;  animation-delay: -2s; }
  @keyframes drift { from { opacity: 0.35; transform: translate(0,0); } to { opacity: 0.7; transform: translate(14px,-12px); } }
  .label {
    position: absolute; left: 28px; bottom: 22px;
    font-family: var(--font-mono); font-size: 0.62rem;
    color: rgba(255,255,255,0.55); text-transform: uppercase; letter-spacing: 0.08em;
  }
</style></head><body><div class="card">
  <span class="chip" style="--c:#CC342D; left:6%; top:14%"><i class="devicon-ruby-plain"></i></span>
  <span class="chip" style="--c:#00ADD8; left:88%; top:8%"><i class="devicon-go-plain"></i></span>
  <span class="chip" style="--c:#2496ED; left:72%; top:62%"><i class="devicon-docker-plain"></i></span>
  <span class="chip" style="--c:#326CE5; left:18%; top:72%"><i class="devicon-kubernetes-plain"></i></span>
  <span class="chip" style="--c:#F05138; left:92%; top:38%"><i class="devicon-swift-plain"></i></span>
  <span class="chip" style="--c:#336791; left:3%; top:52%"><i class="devicon-postgresql-plain"></i></span>
  <span class="chip" style="--c:#844FBA; left:55%; top:78%"><i class="devicon-terraform-plain"></i></span>
  <span class="chip" style="--c:#FF9900; left:80%; top:22%"><i class="devicon-amazonwebservices-plain-wordmark"></i></span>
  <span class="chip" style="--c:#42B883; left:40%; top:8%"><i class="devicon-vuejs-plain"></i></span>
  <span class="chip" style="--c:#3178C6; left:65%; top:42%"><i class="devicon-typescript-plain"></i></span>
  <span class="chip" style="--c:#F7DF1E; left:25%; top:30%"><i class="devicon-javascript-plain"></i></span>
  <span class="chip" style="--c:#CC0000; left:10%; top:32%"><i class="devicon-rails-plain"></i></span>
  <div class="label">Hero chip-field · 16 drifting devicons, 8–14s alternate · home only</div>
</div></body></html>
