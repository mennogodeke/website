ruby_on_rails:
  name: Ruby on Rails
  level: expert
  icon: devicon-rails-plain
  description_en: "Primary back-end framework — APIs, payment integrations, and full-stack web applications."
  description_nl: "Primair back-end framework — API's, betalingsintegraties en full-stack webapplicaties."
  description_de: "Primäres Back-End-Framework — APIs, Zahlungsintegrationen und Full-Stack-Webanwendungen."

ruby:
  name: Ruby
  level: expert
