jobs:

  - key: kape_senior
    company: Kape Technologies
    logo: kape_technologies.png   # to be provided
    start_date: "2022-02-01"
    end_date: "2026-01-01"
    accent: ~
    skills:
      - ruby_on_rails
      - ruby
      - go
      - docker
      - aws
      - terraform
      - github_actions
      - chargebee
      - kubernetes
    translations:
      en:
        title: Senior Software Engineer
        description: >
          Led payment and subscription engineering across PIA and ExpressVPN.
