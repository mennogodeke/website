expertises:

  - key: backend
    years_of_experience: 8
    category: backend
    accent: ~
    icon: fa-solid fa-server
    image: ~
    skills:
      - ruby_on_rails
      - ruby
      - postgresql
      - docker
      - adyen
      - chargebee
      - stripe
      - nodejs
      - typescript
      - go
    translations:
      en:
        name: Back-end Development
        description: >
          Building APIs, payment integrations, and subscription engines in
          Ruby on Rails. Eight years of designing systems that handle real
          money for real users — and haven't caught fire yet.
      nl:
        name: Back-end Ontwikkeling
        description: >
          Het bouwen van API's, betalingsintegraties en abonnementsmotoren
          in Ruby on Rails. Acht jaar lang systemen ontwerpen die echt geld
          verwerken voor echte gebruikers — en tot nu toe zonder brand.
      de:
        name: Back-End-Entwicklung
        description: >
          Entwicklung von APIs, Zahlungsintegrationen und
          Subscription-Engines in Ruby on Rails. Acht Jahre lang Systeme
          entworfen, die echtes Geld für echte Nutzer verarbeiten —
          bisher ohne Zwischenfall.

  - key: fullstack
    years_of_experience: 10
    category: fullstack
    accent: ~
    icon: fa-solid fa-layer-group
    image: ~
    skills:
      - ruby_on_rails
      - javascript
      - vuejs
      - typescript
      - nodejs
      - postgresql
    translations:
      en:
        name: Full-Stack Development
        description: >
          Front to back, from database schema to the button that triggers
          it all. Ten years of making the whole thing work together —
          including the parts that weren't supposed to talk to each other.
      nl:
        name: Full-Stack Ontwikkeling
        description: >
          Van voor tot achter, van databaseschema tot de knop die alles
          in gang zet. Tien jaar lang de hele boel laten samenwerken —
          inclusief de onderdelen die dat eigenlijk niet zouden moeten doen.
      de:
        name: Full-Stack-Entwicklung
        description: >
          Von vorne bis hinten, vom Datenbankschema bis zum Button, der
          alles auslöst. Zehn Jahre lang das Gesamtsystem zum Laufen
          gebracht — einschließlich der Teile, die eigentlich nicht
          miteinander reden sollten.

  - key: devops
    years_of_experience: 5
    category: devops
    accent: ~
    icon: fa-solid fa-gears
    image: ~
    skills:
      - docker
      - github_actions
      - kubernetes
      - ansible
    translations:
      en:
        name: DevOps & Automation
        description: >
          Automating everything from local dev environments to production
          deployments. If something needs to happen more than once,
          it should happen without me.
      nl:
        name: DevOps & Automatisering
        description: >
          Alles automatiseren, van lokale ontwikkelomgevingen tot
          productie-deployments. Als iets vaker dan één keer moet
          gebeuren, moet het zonder mij kunnen.
      de:
        name: DevOps & Automatisierung
        description: >
          Automatisierung von lokalen Entwicklungsumgebungen bis hin
          zu Produktions-Deployments. Wenn etwas mehr als einmal
          passieren muss, sollte es ohne mich passieren.

  - key: cloud
    years_of_experience: 3
    category: platform
    accent: ~
    icon: fa-solid fa-cloud
    image: ~
    skills:
      - aws
      - terraform
      - ansible
      - docker
      - kubernetes
    translations:
      en:
        name: Cloud & Infrastructure
        description: >
          Designing and managing cloud infrastructure on AWS —
          infrastructure-as-code, secrets management, and making sure
          the database is reachable without opening it to the entire internet.
      nl:
        name: Cloud & Infrastructuur
        description: >
          Cloud-infrastructuur ontwerpen en beheren op AWS —
          infrastructure-as-code, secretenbeheer en ervoor zorgen dat
          de database bereikbaar is zonder hem voor het hele internet
          open te zetten.
      de:
        name: Cloud & Infrastruktur
        description: >
          Entwurf und Verwaltung von Cloud-Infrastruktur auf AWS —
          Infrastructure-as-Code, Secrets-Management und sicherstellen,
          dass die Datenbank erreichbar ist, ohne sie dem gesamten
          Internet zu öffnen.

  - key: apps
    years_of_experience: 2
    category: apps
    accent: ~
    icon: fa-brands fa-apple
    image: ~
    skills:
      - swift
    translations:
      en:
        name: iOS & macOS Development
        description: >
          Native app development for Apple platforms using Swift and Xcode,
          plus server-side Swift with the Vapor framework.
      nl:
        name: iOS & macOS Ontwikkeling
        description: >
          Native app-ontwikkeling voor Apple-platforms met Swift en Xcode,
          plus server-side Swift met het Vapor-framework.
      de:
        name: iOS & macOS Entwicklung
        description: >
          Native App-Entwicklung für Apple-Plattformen mit Swift und Xcode,
          plus serverseitiges Swift mit dem Vapor-Framework.


