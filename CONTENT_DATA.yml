          marketing campaign workflows, and pivoted into DevOps — shipping
          microservice templates in Go, managing AWS infrastructure with
          Terraform, and setting up secure database access for developers
          and CI pipelines via SSM port-forwarding.
      nl:
        title: Senior Software Engineer
        description: >
          Leidde betalings- en abonnementsontwikkeling voor PIA en ExpressVPN.
          Bouwde een intern productcatalogussysteem bovenop ChargeBee,
          automatiseerde marketingcampagne-workflows en verschoof richting
          DevOps — met microservice-templates in Go, AWS-infrastructuurbeheer
          via Terraform en het opzetten van veilige databasetoegang voor
          ontwikkelaars en CI-pipelines via SSM port-forwarding.
      de:
        title: Senior Software Engineer
        description: >
          Leitete Payment- und Subscription-Engineering für PIA und ExpressVPN.
          Entwickelte einen internen Produktkatalog auf Basis von ChargeBee,
          automatisierte Marketing-Kampagnen-Workflows und wechselte in den
          DevOps-Bereich — mit Microservice-Templates in Go,
          AWS-Infrastrukturverwaltung über Terraform und sicherem
          Datenbankzugang für Entwickler und CI-Pipelines via SSM
          Port-Forwarding.

